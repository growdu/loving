<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务卡牌 - 17fei</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #ff6b9d;
      --primary-dark: #c44569;
      --accent: #ff8fab;
      --bg: #fff0f5;
      --bg-secondary: #ffe4ec;
      --text: #4a4a4a;
      --text-light: #8a6c6c;
      --card: #ffffff;
      --border: rgba(255,107,157,0.2);
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 4px 20px rgba(255,107,157,0.3);
      --shadow-hover: 0 8px 30px rgba(255,107,157,0.4);
      --gradient: linear-gradient(135deg, #ff6b9d, #c44569);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    @keyframes flipIn {
      0% { transform: rotateY(90deg); opacity: 0; }
      100% { transform: rotateY(0); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-2deg); }
      75% { transform: translateX(5px) rotate(2deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }

    .nav-title {
      font-weight: 600;
      color: var(--text);
    }

    .nav-action {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* 主内容 */
    .main-content {
      padding-top: 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 卡牌区域 */
    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* 翻转卡片 */
    .flip-card {
      width: 280px;
      height: 400px;
      perspective: 1000px;
      cursor: pointer;
    }

    .flip-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .flip-card-front {
      background: var(--gradient);
      color: white;
    }

    .flip-card-front-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 2s ease-in-out infinite;
    }

    .flip-card-front-text {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .flip-card-back {
      background: var(--card);
      transform: rotateY(180deg);
      border: 2px solid var(--border);
    }

    .flip-card-back-content {
      writing-mode: vertical-rl;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 4px;
    }

    .card-id {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    /* 操作按钮 */
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-top: 32px;
    }

    .action-btn {
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    .action-btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: var(--shadow);
    }

    .action-btn-primary:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-hover);
    }

    .action-btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .action-btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 玩法说明 */
    .rules-section {
      padding: 24px 20px;
      background: var(--bg-secondary);
    }

    .rules-inner {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .rules-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .rules-text {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.8;
    }

    /* 版本选择 */
    .version-selector {
      padding: 16px 20px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    .version-inner {
      max-width: 1200px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .version-scroll {
      display: flex;
      gap: 12px;
      padding-bottom: 8px;
    }

    .version-chip {
      flex-shrink: 0;
      padding: 10px 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .version-chip:hover {
      border-color: var(--primary);
    }

    .version-chip.active {
      background: var(--gradient);
      color: white;
      border-color: transparent;
    }

    .version-chip.locked {
      position: relative;
    }

    .version-chip.locked::after {
      content: '🔒';
      margin-left: 6px;
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 4px 12px;
      transition: color 0.2s;
    }

    .bottom-nav-item span:first-child {
      font-size: 1.3rem;
    }

    .bottom-nav-item.active {
      color: var(--primary);
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .flip-card {
        width: 240px;
        height: 340px;
      }

      .flip-card-back-content {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="back-btn">
          <span>←</span>
        </a>
        <div class="nav-title">{{ currentVersion }}</div>
        <a href="#" class="nav-action">选择版本</a>
      </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
      <!-- 卡牌区域 -->
      <section class="card-area">
        <div
          class="flip-card"
          :class="{ flipped: isFlipped }"
          @click="flipCard"
        >
          <div class="flip-card-inner">
            <div class="flip-card-front">
              <div class="flip-card-front-icon">💕</div>
              <div class="flip-card-front-text">点击抽取任务</div>
            </div>
            <div class="flip-card-back">
              <div class="flip-card-back-content">{{ currentTask }}</div>
              <div class="card-id">#{{ cardIndex }}</div>
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="action-btn action-btn-secondary" @click="resetCard">
            重置
          </button>
          <button class="action-btn action-btn-primary" @click="flipCard">
            {{ isFlipped ? '再抽一张' : '翻转' }}
          </button>
        </div>
      </section>

      <!-- 玩法说明 -->
      <section class="rules-section">
        <div class="rules-inner">
          <div class="rules-title">基本玩法</div>
          <p class="rules-text">
            轮流抽卡完成任务<br>
            无法完成认输受惩罚
          </p>
        </div>
      </section>

      <!-- 版本选择 -->
      <section class="version-selector">
        <div class="version-inner">
          <div class="version-scroll">
            <div
              v-for="version in versions"
              :key="version.id"
              class="version-chip"
              :class="{
                active: currentVersionId === version.id,
                locked: version.locked && !isVip
              }"
              @click="selectVersion(version)"
            >
              {{ version.name }}
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <a href="index.html" class="bottom-nav-item">
        <span>🏠</span>
        <span>首页</span>
      </a>
      <a href="positions.html" class="bottom-nav-item">
        <span>❤️</span>
        <span>姿势</span>
      </a>
      <a href="#" class="bottom-nav-item active">
        <span>🎴</span>
        <span>卡牌</span>
      </a>
    </nav>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const isFlipped = ref(false);
        const currentVersionId = ref('lover0');
        const isVip = ref(false);
        const cardIndex = ref(1);

        const versions = [
          { id: 'lover0', name: '恋爱版', locked: false },
          { id: 'lover1', name: '热恋版', locked: false },
          { id: 'sex0', name: '同居版', locked: true },
          { id: 'sex1', name: '进阶版', locked: true },
          { id: 'sex2', name: '私密版', locked: true },
          { id: 'sm', name: 'SM版', locked: true },
          { id: 'huwai', name: '户外版', locked: true },
          { id: 'custom', name: '自定义', locked: true }
        ];

        const tasks = {
          lover0: ['牵手漫步', '深情对视', '互喂美食', '拥抱一分钟', '说出一件喜欢对方的事'],
          lover1: ['壁咚对方', '公主抱', '亲吻额头', '一起跳舞', '为对方按摩'],
          sex0: ['睡衣派对', '深夜聊天', '一起看电影', '互诉心事', '制造惊喜']
        };

        const currentTask = computed(() => {
          const versionTasks = tasks[currentVersionId.value] || tasks.lover0;
          const index = Math.floor(Math.random() * versionTasks.length);
          return versionTasks[index];
        });

        const currentVersion = computed(() => {
          const v = versions.find(x => x.id === currentVersionId.value);
          return v ? v.name : '任务卡牌';
        });

        const flipCard = () => {
          isFlipped.value = !isFlipped.value;
          if (isFlipped.value) {
            cardIndex.value = Math.floor(Math.random() * 100) + 1;
          }
        };

        const resetCard = () => {
          isFlipped.value = false;
        };

        const selectVersion = (version) => {
          if (version.locked && !isVip.value) {
            alert('请开通VIP解锁此版本');
            return;
          }
          currentVersionId.value = version.id;
          isFlipped.value = false;
        };

        onMounted(() => {
          const vipStatus = localStorage.getItem('vip_status');
          isVip.value = vipStatus === 'true';
        });

        return {
          isFlipped,
          currentVersionId,
          currentVersion,
          isVip,
          cardIndex,
          versions,
          currentTask,
          flipCard,
          resetCard,
          selectVersion
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
